  document.getElementById("ct-badge").style.color = "var(--accent)";
  renderScenarioBtns();
  goScreen("chat-screen");
  document.getElementById("messages").innerHTML = "";
  addSystemMsg("Starting a new conversation — " + s.label);
  setLoading(true);
  callClaude([{role:"user",content:"Open the conversation with a single natural line that fits the scenario. Just your opening — nothing else. Make it feel real."}]).then(r => {
    setLoading(false);
    if (r) { state.history.push({role:"assistant",content:r}); addMsg(r,"them"); }
  });
}

function renderScenarioBtns() {
  document.getElementById("chat-scenario-bar").innerHTML = SCENARIOS.map(s => `
    <button class="chat-scenario-btn ${s.id === state.scenario ? 'active' : ''}" onclick="changeScenario('${s.id}')">${s.icon} ${s.label}</button>
  `).join("");
}

function changeScenario(id) {
  state.scenario = id;
  state.history = [];
  renderScenarioBtns();
  document.getElementById("ct-badge").textContent = SCENARIOS.find(s=>s.id===id).icon + " " + SCENARIOS.find(s=>s.id===id).label;
  document.getElementById("messages").innerHTML = "";
  addSystemMsg("Switching scenario — " + SCENARIOS.find(s=>s.id===id).label);
  setLoading(true);
  callClaude([{role:"user",content:"Open the conversation with a single natural line that fits this new scenario. Just your opening."}]).then(r => {
    setLoading(false);
    if (r) { state.history.push({role:"assistant",content:r}); addMsg(r,"them"); }
  });
}

function getSystemPrompt() {
  const p = state.persona;
  const sc = SCENARIOS.find(x=>x.id===state.scenario);
  const attachGuide = {
    secure:"You're generally comfortable with intimacy. You can express needs clearly, tolerate distance without panic, and repair conflict without drama.",
    anxious:"You crave closeness and fear abandonment. You seek reassurance often. You can become clingy, read into silences, and escalate emotionally when you feel distance.",
    avoidant:"You value independence and find sustained closeness uncomfortable. You pull away when things get too intimate. You express care through action not words. You downplay your own emotional needs.",
    disorganized:"You both crave and fear closeness. You can move toward someone intensely then suddenly withdraw. Your behavior can seem contradictory. You're not doing it deliberately — it's what your nervous system learned."
  };
  return `You are ${p.name}, a ${p.age}-year-old woman from ${p.nat}.

OCCUPATION: ${p.job}
EDUCATION: ${p.edu}
PERSONALITY TRAITS: ${p.traits.join(", ")}
ATTACHMENT STYLE: ${p.attach} — ${attachGuide[p.attach]}
FORMATIVE WOUND: ${p.shadow}
WHO YOU ARE: ${p.bio}

CURRENT SCENARIO: ${sc.label} — ${sc.desc}

CORE RULES:
- You are a real person, not a helpful AI. Stay completely in character.
- Let your attachment style and wound color your responses — subtly, not theatrically.
- Respond the way a real person would in this moment: short to medium length, natural, sometimes imperfect.
- Have genuine friction, humor, guardedness, warmth — whatever fits who you are.
- Do NOT perform the perfect romantic partner. Have real reactions.
- Respond to HOW he communicates — if he's emotionally intelligent, warm to it; if he's clumsy or avoidant, let it land.
- Occasionally use phrases or cultural references that feel natural to your background.
- Never explain your psychology. Live it.
- Never break the fourth wall.`;
}

async function sendMsg() {
  const input = document.getElementById("user-input");
  const text = input.value.trim();
  if (!text || document.getElementById("send-btn").disabled) return;
  input.value = "";
  autoResize(input);
  addMsg(text, "me");
  state.history.push({role:"user",content:text});
  document.getElementById("send-btn").disabled = true;
  setLoading(true);
  const reply = await callClaude(state.history);
  setLoading(false);
  document.getElementById("send-btn").disabled = false;
  if (reply) { state.history.push({role:"assistant",content:reply}); addMsg(reply,"them"); }
}

async function callClaude(messages) {
  try {
    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:getSystemPrompt(),messages})
    });
    const data = await res.json();
    return data.content?.[0]?.text || null;
  } catch(e) { return null; }
}

async function showFeedback() {
  if (state.history.length < 4) { alert("Have at least a few exchanges first."); return; }
  goScreen("feedback-screen");
  const p = state.persona;
  const sc = SCENARIOS.find(x=>x.id===state.scenario);
  document.getElementById("fb-subtitle").textContent = p.name + " · " + sc.label;
  document.getElementById("fb-content").innerHTML = `<div class="fb-loading">Analyzing your conversation...</div>`;
  const transcript = state.history.map(m=>`${m.role==="user"?"YOU":p.name}: ${m.content}`).join("\n");
  const prompt = `You are an expert relationship coach specializing in attachment theory, communication, and intimacy.

Analyze this conversation between a 30-year-old European man and ${p.name} (${p.age} years old, ${p.nat}, ${p.attach} attachment style, formative wound: "${p.shadow}").

SCENARIO: ${sc.label} — ${sc.desc}

TRANSCRIPT:
${transcript}

Provide deep, honest, specific coaching. Do NOT be generic. Reference actual moments from the transcript.

Respond ONLY in this exact JSON format with no markdown:
{
  "scores": {
    "emotional_attunement": <0-100>,
    "authenticity": <0-100>,
    "boundary_awareness": <0-100>,
    "depth_of_connection": <0-100>
  },
  "score_notes": {
    "emotional_attunement": "<one specific sentence about why this score>",
    "authenticity": "<one specific sentence>",
    "boundary_awareness": "<one specific sentence>",
    "depth_of_connection": "<one specific sentence>"
  },
  "what_worked": ["<specific moment or pattern that worked and why>","<another one>","<third if applicable>"],
  "missed_opportunities": ["<specific moment or pattern that could have gone differently and how>","<another one>"],
  "attachment_navigation": "<2-3 sentences: how did he navigate her specific attachment style and wound? Was he attuned to what she needed?>"  ,
  "key_growth_area": "<The single most important insight — be honest, specific, and constructive. Reference the transcript.>",
  "next_practice": "<One concrete thing to try in the next conversation — specific and actionable>"
}`;
  const res = await callClaude([{role:"user",content:prompt}]);
  try {
    const clean = (res||"").replace(/```json|```/g,"").trim();
    const data = JSON.parse(clean);
    renderFeedback(data);
    saveSession(data);
  } catch(e) {
    document.getElementById("fb-content").innerHTML = `<p style="color:var(--text2);font-size:14px">Could not parse feedback. Have a longer conversation and try again.</p>`;
  }
}

function renderFeedback(data) {
  const scoreConfig = {
    emotional_attunement:{label:"Emotional attunement",color:"#5a9e7a"},
    authenticity:{label:"Authenticity",color:"#c9a96e"},
    boundary_awareness:{label:"Boundary awareness",color:"#5a7ea0"},
    depth_of_connection:{label:"Depth of connection",color:"#a07090"},
  };
  const scoreHTML = Object.entries(data.scores).map(([k,v]) => {
    const cfg = scoreConfig[k];
    return `<div class="score-card">
      <div class="score-card-label">${cfg.label}</div>
      <div class="score-card-val" style="color:${cfg.color}">${v}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.5">${data.score_notes?.[k]||""}</div>
      <div class="score-bar-bg"><div class="score-bar-fill" style="width:${v}%;background:${cfg.color}"></div></div>
    </div>`;
  }).join("");
  document.getElementById("fb-content").innerHTML = `
    <div class="score-grid">${scoreHTML}</div>
    <div class="fb-sections">
      <div class="fb-section">
        <h4>What worked</h4>
        <ul>${data.what_worked.map(w=>`<li>${w}</li>`).join("")}</ul>
      </div>
      <div class="fb-section">
        <h4>Missed opportunities</h4>
        <ul>${data.missed_opportunities.map(w=>`<li>${w}</li>`).join("")}</ul>
      </div>
      <div class="fb-section">
        <h4>How you navigated her attachment style</h4>
        <p>${data.attachment_navigation}</p>
      </div>
      <div class="fb-section highlight">
        <h4>Key growth area</h4>
        <p>${data.key_growth_area}</p>
      </div>
      <div class="fb-section" style="border-color:rgba(90,158,122,0.3)">
        <h4>Practice for next time</h4>
        <p style="color:var(--text)">${data.next_practice}</p>
      </div>
    </div>
    <div class="fb-actions">
      <button class="fb-btn-primary" onclick="goScreen('chat-screen')">Continue talking</button>
      <button class="fb-btn-secondary" onclick="goScreen('browse')">New persona</button>
    </div>
  `;
}

function saveSession(data) {
  const avg = Math.round(Object.values(data.scores).reduce((a,b)=>a+b,0)/4);
  state.sessions.unshift({
    persona:{name:state.persona.name,initials:state.persona.initials,bg:state.persona.bg,fg:state.persona.fg,nat:state.persona.nat},
    scenario:SCENARIOS.find(s=>s.id===state.scenario)?.label,
    scores:data.scores,
    avg,
    date:new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"}),
  });
  state.sessions = state.sessions.slice(0,30);
  localStorage.setItem("sessions",JSON.stringify(state.sessions));
}

function renderProgress() {
  const sessions = state.sessions;
  const avg = n => sessions.length ? Math.round(sessions.reduce((a,s)=>a+(s.scores[n]||0),0)/sessions.length) : "—";
  document.getElementById("stats-row").innerHTML = `
    <div class="stat-card"><div class="stat-num">${sessions.length}</div><div class="stat-lbl">Sessions completed</div></div>
    <div class="stat-card"><div class="stat-num">${avg("emotional_attunement")}</div><div class="stat-lbl">Avg emotional attunement</div></div>
    <div class="stat-card"><div class="stat-num">${avg("authenticity")}</div><div class="stat-lbl">Avg authenticity</div></div>
    <div class="stat-card"><div class="stat-num">${avg("depth_of_connection")}</div><div class="stat-lbl">Avg connection depth</div></div>
  `;
  document.getElementById("history-list").innerHTML = sessions.length === 0
    ? `<div class="empty-state"><div style="font-size:32px">💬</div><p>No sessions yet. Start a conversation and get feedback to track your progress.</p></div>`
    : sessions.map(s => `
      <div class="history-item">
        <div class="history-avatar" style="background:${s.persona.bg};color:${s.persona.fg}">${s.persona.initials}</div>
        <div class="history-info">
          <div class="history-name">${s.persona.name} · ${s.scenario}</div>
          <div class="history-sub">${s.persona.nat} · ${s.date}</div>
        </div>
        <div class="history-score">${s.avg}</div>
      </div>
    `).join("");
}

function addMsg(text, type) {
  const area = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "msg-row " + type;
  if (type === "them") {
    const av = document.createElement("div");
    av.className = "msg-avatar";
    av.style.background = state.persona?.bg || "rgba(90,126,160,0.2)";
    av.style.color = state.persona?.fg || "#80aad0";
    av.style.fontSize = "11px";
    av.textContent = state.persona?.initials || "?";
    row.appendChild(av);
  }
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.textContent = text;
  row.appendChild(bubble);
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function addSystemMsg(text) {
  const area = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "msg-row system";
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.textContent = text;
  row.appendChild(bubble);
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function setLoading(on) {
  const area = document.getElementById("messages");
  const ex = document.getElementById("typing");
  if (ex) ex.remove();
  if (on) {
    const d = document.createElement("div");
    d.id = "typing";
    d.className = "typing-dots";
    d.innerHTML = "<span></span><span></span><span></span>";
    area.appendChild(d);
    area.scrollTop = area.scrollHeight;
  }
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 130) + "px";
}

renderGrid();
</script>
</body>
</html>
