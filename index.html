
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intimate — Relationship Training</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0e;
  --surface: #141416;
  --surface2: #1c1c1f;
  --surface3: #242428;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0ede8;
  --text2: #9a978f;
  --text3: #5a574f;
  --accent: #c9a96e;
  --accent2: #e8d5b0;
  --danger: #c0614a;
  --success: #5a9e7a;
  --info: #5a7ea0;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(12,12,14,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;gap:2rem;height:56px}
.logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);letter-spacing:0.02em;cursor:pointer}
.nav-tabs{display:flex;gap:4px;margin-left:auto}
.nav-tab{padding:6px 16px;border-radius:6px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .2s;border:none;background:none}
.nav-tab:hover{color:var(--text);background:var(--surface2)}
.nav-tab.active{color:var(--accent);background:rgba(201,169,110,0.1)}

/* SCREENS */
.screen{display:none;animation:fadeIn .25s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ===== BROWSE ===== */
#browse{padding:2rem}
.browse-header{margin-bottom:2rem}
.browse-header h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:400;color:var(--text);margin-bottom:6px}
.browse-header p{color:var(--text2);font-size:14px}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.5rem}
.filters input,.filters select{background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 14px;border-radius:8px;outline:none}
.filters input{flex:1;min-width:200px}
.filters input::placeholder{color:var(--text3)}
.filters select option{background:var(--surface2)}
.filters input:focus,.filters select:focus{border-color:rgba(201,169,110,0.4)}
.persona-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,rgba(201,169,110,0.03));pointer-events:none}
.pcard:hover{border-color:rgba(201,169,110,0.3);background:var(--surface2);transform:translateY(-2px)}
.pcard-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;margin-bottom:12px;font-family:'DM Sans',sans-serif}
.pcard-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.pcard-sub{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.4}
.pcard-chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500}
.chip-attach-secure{background:rgba(90,158,122,0.15);color:#7ec4a0}
.chip-attach-anxious{background:rgba(192,97,74,0.15);color:#e09080}
.chip-attach-avoidant{background:rgba(90,126,160,0.15);color:#80aad0}
.chip-attach-disorganized{background:rgba(150,110,180,0.15);color:#c090e0}
.count-bar{font-size:12px;color:var(--text3);margin-bottom:1rem}

/* ===== PERSONA DETAIL ===== */
#detail{padding:2rem}
.detail-back{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;cursor:pointer;margin-bottom:1.5rem;padding:6px 12px;border-radius:6px;border:1px solid var(--border);transition:all .2s}
.detail-back:hover{color:var(--text);border-color:var(--border2)}
.detail-layout{display:grid;grid-template-columns:320px 1fr;gap:2rem}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;position:sticky;top:72px;align-self:start}
.detail-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:500;margin-bottom:1.25rem}
.detail-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;margin-bottom:4px}
.detail-tagline{font-size:13px;color:var(--text2);margin-bottom:1.5rem;line-height:1.5}
.detail-section{margin-bottom:1.25rem}
.detail-label{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:6px}
.detail-value{font-size:13px;color:var(--text);line-height:1.6}
.detail-traits{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.trait-tag{font-size:12px;padding:4px 10px;background:var(--surface3);border:1px solid var(--border);border-radius:20px;color:var(--text2)}
.detail-right{}
.scenario-list{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem}
.scenario-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px}
.scenario-item:hover{border-color:rgba(201,169,110,0.3);background:var(--surface2)}
.scenario-item.selected{border-color:var(--accent);background:rgba(201,169,110,0.05)}
.scenario-icon{font-size:20px;width:36px;text-align:center}
.scenario-info h4{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.scenario-info p{font-size:12px;color:var(--text2)}
.start-btn{width:100%;padding:14px;background:var(--accent);color:#1a1408;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;border:none;border-radius:10px;cursor:pointer;transition:all .2s}
.start-btn:hover{background:var(--accent2)}

/* ===== CHAT ===== */
#chat-screen{display:none;flex-direction:column;height:calc(100vh - 56px)}
#chat-screen.active{display:flex}
.chat-top{display:flex;align-items:center;gap:14px;padding:14px 2rem;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.chat-top-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500}
.chat-top-info h3{font-size:15px;font-weight:500;color:var(--text)}
.chat-top-info p{font-size:12px;color:var(--text2)}
.chat-top-badge{margin-left:auto;font-size:11px;padding:4px 12px;border-radius:20px}
.chat-back-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.chat-back-btn:hover{border-color:var(--border2);color:var(--text)}
.chat-scenario-bar{display:flex;gap:6px;padding:10px 2rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.chat-scenario-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .2s}
.chat-scenario-btn:hover{border-color:var(--border2);color:var(--text)}
.chat-scenario-btn.active{background:rgba(201,169,110,0.12);border-color:rgba(201,169,110,0.4);color:var(--accent)}
.messages-area{flex:1;overflow-y:auto;padding:1.5rem 2rem;display:flex;flex-direction:column;gap:12px}
.messages-area::-webkit-scrollbar{width:4px}
.messages-area::-webkit-scrollbar-track{background:transparent}
.messages-area::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
.msg-row{display:flex;gap:10px;max-width:680px}
.msg-row.me{align-self:flex-end;flex-direction:row-reverse}
.msg-row.system{align-self:center}
.msg-row.them{align-self:flex-start}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:2px}
.msg-bubble{padding:11px 16px;border-radius:16px;font-size:14px;line-height:1.65;max-width:520px}
.msg-row.them .msg-bubble{background:var(--surface2);color:var(--text);border-radius:4px 16px 16px 16px}
.msg-row.me .msg-bubble{background:rgba(201,169,110,0.15);color:var(--accent2);border-radius:16px 4px 16px 16px}
.msg-row.system .msg-bubble{background:none;color:var(--text3);font-size:12px;font-style:italic;padding:4px 0}
.typing-dots{display:flex;gap:4px;padding:14px 16px;background:var(--surface2);border-radius:4px 16px 16px 16px;align-self:flex-start}
.typing-dots span{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:tdot 1.3s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.chat-input-area{padding:1rem 2rem 1.25rem;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.chat-input-row{display:flex;gap:10px;align-items:flex-end}
.chat-input-row textarea{flex:1;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 16px;border-radius:10px;resize:none;min-height:44px;max-height:130px;outline:none;line-height:1.5}
.chat-input-row textarea:focus{border-color:rgba(201,169,110,0.4)}
.chat-input-row textarea::placeholder{color:var(--text3)}
.send-btn{padding:11px 22px;background:var(--accent);color:#1a1408;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s}
.send-btn:hover{background:var(--accent2)}
.send-btn:disabled{opacity:.35;cursor:default}
.feedback-trigger{margin-top:10px;width:100%;padding:9px;background:none;border:1px solid var(--border);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;border-radius:8px;cursor:pointer;transition:all .2s}
.feedback-trigger:hover{border-color:var(--border2);color:var(--text)}

/* ===== FEEDBACK ===== */
#feedback-screen{display:none;padding:2rem;overflow-y:auto}
#feedback-screen.active{display:block}
.fb-back{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;cursor:pointer;margin-bottom:1.5rem;padding:6px 12px;border-radius:6px;border:1px solid var(--border)}
.fb-back:hover{color:var(--text);border-color:var(--border2)}
.fb-header{margin-bottom:2rem}
.fb-header h2{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;margin-bottom:4px}
.fb-header p{font-size:13px;color:var(--text2)}
.fb-loading{color:var(--text2);font-size:14px;display:flex;align-items:center;gap:10px}
.score-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:2rem}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
.score-card-label{font-size:12px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.score-card-val{font-size:32px;font-weight:300;font-family:'Playfair Display',serif;margin-bottom:10px}
.score-bar-bg{height:3px;background:var(--surface3);border-radius:2px}
.score-bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
.fb-sections{display:flex;flex-direction:column;gap:12px;margin-bottom:2rem}
.fb-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.fb-section h4{font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:12px}
.fb-section ul{padding-left:16px;display:flex;flex-direction:column;gap:6px}
.fb-section li,.fb-section p{font-size:14px;color:var(--text2);line-height:1.7}
.fb-section.highlight{border-color:rgba(201,169,110,0.3)}
.fb-section.highlight h4{color:var(--accent)}
.fb-section.highlight p{color:var(--text)}
.fb-actions{display:flex;gap:10px}
.fb-actions button{flex:1;padding:12px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .2s}
.fb-btn-primary{background:var(--accent);color:#1a1408;border:none;font-weight:500}
.fb-btn-primary:hover{background:var(--accent2)}
.fb-btn-secondary{background:none;border:1px solid var(--border2);color:var(--text2)}
.fb-btn-secondary:hover{border-color:var(--border);color:var(--text)}

/* ===== PROGRESS ===== */
#progress-screen{padding:2rem;overflow-y:auto}
.prog-header{margin-bottom:2rem}
.prog-header h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:400;margin-bottom:6px}
.prog-header p{color:var(--text2);font-size:14px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
.stat-num{font-size:28px;font-family:'Playfair Display',serif;font-weight:400;color:var(--accent);margin-bottom:4px}
.stat-lbl{font-size:12px;color:var(--text2)}
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px}
.history-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.history-info{flex:1}
.history-name{font-size:14px;font-weight:500;margin-bottom:2px}
.history-sub{font-size:12px;color:var(--text2)}
.history-score{font-size:18px;font-family:'Playfair Display',serif;color:var(--accent)}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text2);font-size:14px}
.empty-state p{margin-top:8px;font-size:13px;color:var(--text3)}
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="goScreen('browse')">intimate</div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-browse" onclick="goScreen('browse')">Personas</button>
    <button class="nav-tab" id="tab-progress" onclick="goScreen('progress')">Progress</button>
  </div>
</nav>

<!-- BROWSE -->
<div id="browse" class="screen active">
  <div class="browse-header">
    <h1>Find someone to talk to</h1>
    <p>100 personas · different backgrounds, attachment styles, and life stories</p>
  </div>
  <div class="filters">
    <input type="text" id="search" placeholder="Search by name, nationality, job..." oninput="renderGrid()">
    <select id="fAge" onchange="renderGrid()">
      <option value="">All ages</option>
      <option value="20s">20s</option>
      <option value="30s">30s</option>
      <option value="40s">40s</option>
    </select>
    <select id="fAttach" onchange="renderGrid()">
      <option value="">All attachment styles</option>
      <option value="secure">Secure</option>
      <option value="anxious">Anxious</option>
      <option value="avoidant">Avoidant</option>
      <option value="disorganized">Disorganized</option>
    </select>
    <select id="fRegion" onchange="renderGrid()">
      <option value="">All regions</option>
      <option value="Western Europe">Western Europe</option>
      <option value="Eastern Europe">Eastern Europe</option>
      <option value="North America">North America</option>
      <option value="Latin America">Latin America</option>
      <option value="East Asia">East Asia</option>
      <option value="South Asia">South Asia</option>
      <option value="Middle East">Middle East</option>
      <option value="Africa">Africa</option>
      <option value="Southeast Asia">Southeast Asia</option>
      <option value="Oceania">Oceania</option>
    </select>
  </div>
  <div class="count-bar" id="count-bar"></div>
  <div class="persona-grid" id="grid"></div>
</div>

<!-- DETAIL -->
<div id="detail" class="screen">
  <div class="detail-back" onclick="goScreen('browse')">← Back to personas</div>
  <div class="detail-layout">
    <div class="detail-card" id="detail-card"></div>
    <div class="detail-right">
      <h3 style="font-family:'Playfair Display',serif;font-size:20px;font-weight:400;margin-bottom:16px;color:var(--text2)">Choose a scenario</h3>
      <div class="scenario-list" id="scenario-list"></div>
      <button class="start-btn" onclick="startChat()">Begin conversation →</button>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div class="chat-top">
    <button class="chat-back-btn" onclick="goScreen('detail')">← Back</button>
    <div class="chat-top-avatar" id="ct-avatar"></div>
    <div class="chat-top-info">
      <h3 id="ct-name"></h3>
      <p id="ct-sub"></p>
    </div>
    <div class="chat-top-badge" id="ct-badge"></div>
  </div>
  <div class="chat-scenario-bar" id="chat-scenario-bar"></div>
  <div class="messages-area" id="messages"></div>
  <div class="chat-input-area">
    <div class="chat-input-row">
      <textarea id="user-input" placeholder="Type your message... (Enter to send)" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">Send</button>
    </div>
    <button class="feedback-trigger" onclick="showFeedback()">Get coaching feedback on this conversation</button>
  </div>
</div>

<!-- FEEDBACK -->
<div id="feedback-screen">
  <div class="fb-back" onclick="goScreen('chat-screen')">← Back to conversation</div>
  <div class="fb-header">
    <h2>Session Feedback</h2>
    <p id="fb-subtitle"></p>
  </div>
  <div id="fb-content"></div>
</div>

<!-- PROGRESS -->
<div id="progress-screen" class="screen">
  <div class="prog-header">
    <h1>Your Progress</h1>
    <p>Track how your relational skills are developing over time</p>
  </div>
  <div class="stats-row" id="stats-row"></div>
  <h3 style="font-size:16px;font-weight:500;margin-bottom:1rem;color:var(--text2)">Recent Sessions</h3>
  <div class="history-list" id="history-list"></div>
</div>

<script>
const PERSONAS = [
  {id:1,name:"Sophie",age:28,nat:"French",region:"Western Europe",job:"Architect",edu:"Master's",attach:"avoidant",shadow:"Emotionally distant father who never expressed feelings",traits:["Independent","Witty","Intellectually sharp","Cold under pressure"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"SO",bio:"Sophie grew up in Lyon in a house full of books and silence. Her father was brilliant but emotionally unreachable — she learned early that love and distance coexist. She's built a life that looks complete from the outside. Getting truly close to her requires patience and precision."},
  {id:2,name:"Mia",age:32,nat:"German",region:"Western Europe",job:"Surgeon",edu:"MD/PhD",attach:"secure",shadow:"Perfectionist mother who tied love to achievement",traits:["Direct","Ambitious","Deeply caring","High standards"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"MI",bio:"Mia operated on her first patient at 27. She's used to high-stakes decisions and doesn't tolerate ambiguity. Under her directness is genuine warmth — but you have to earn it. She's secure in herself, even if she sometimes conflates worth with performance."},
  {id:3,name:"Elena",age:25,nat:"Italian",region:"Western Europe",job:"Musician",edu:"Bachelor's",attach:"anxious",shadow:"Parents divorced bitterly when she was 8",traits:["Passionate","Jealous tendencies","Warm","Seeks reassurance"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"EL",bio:"Elena plays violin in a Milan chamber orchestra. She loves fiercely and worries constantly. When she's with someone, she's all-in — and she needs to feel that returned. Her anxiety isn't weakness; it's the scar tissue of watching love collapse as a child."},
  {id:4,name:"Anya",age:34,nat:"Russian",region:"Eastern Europe",job:"Data Scientist",edu:"Master's",attach:"avoidant",shadow:"Moved countries twice before 14, never felt rooted",traits:["Analytical","Sardonic","Fiercely loyal once trusted","Slow to open"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"AN",bio:"Anya has lived in Moscow, Berlin, and now Amsterdam. She's fluent in three languages and emotionally guarded in all of them. She uses humor as armor and logic as a moat. If she lets you in, it means something real."},
  {id:5,name:"Katarzyna",age:29,nat:"Polish",region:"Eastern Europe",job:"Lawyer",edu:"Master's",attach:"secure",shadow:"Overprotective parents who controlled her every move",traits:["Organized","Assertive","Dry wit","Principled"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"KA",bio:"Katarzyna spent her teens fighting for autonomy. Now she has it — and protects it fiercely. She's secure in relationships but allergic to control. She finds comfort in clarity and loses interest fast in people who are vague about what they want."},
  {id:6,name:"Zara",age:26,nat:"Nigerian",region:"Africa",job:"Journalist",edu:"Bachelor's",attach:"anxious",shadow:"Father left the family when she was 12, no explanation",traits:["Charismatic","Emotionally expressive","Driven","Needs consistency"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"ZA",bio:"Zara writes for a Lagos digital paper and is working on her first book. She's magnetic in groups and quietly terrified of abandonment one-on-one. She tests people — not maliciously, but to see if they'll stay."},
  {id:7,name:"Aiko",age:31,nat:"Japanese",region:"East Asia",job:"UX Designer",edu:"Bachelor's",attach:"avoidant",shadow:"High-pressure academic childhood, never praised just corrected",traits:["Observant","Reserved","Quietly creative","Needs solo time"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"AI",bio:"Aiko designs apps by day and paints watercolors by night. She notices everything but says little. Her avoidance isn't coldness — it's self-protection built over years of never being enough. When she does open up, it's specific, considered, and real."},
  {id:8,name:"Priya",age:27,nat:"Indian",region:"South Asia",job:"Startup Founder",edu:"Master's",attach:"secure",shadow:"Family arranged-marriage pressure starting at 22",traits:["Bold","Empathetic","Stubborn","Vision-driven"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"PR",bio:"Priya built her first product at 23. She's confident and knows her mind — sometimes to a fault. She's navigated enormous family pressure without losing herself, which gives her unusual psychological resilience. She wants a partner, not a project."},
  {id:9,name:"Isabella",age:36,nat:"Brazilian",region:"Latin America",job:"Therapist",edu:"Master's",attach:"secure",shadow:"Witnessed parents' toxic, high-drama relationship for 15 years",traits:["Perceptive","Nurturing","Clear boundaries","Calm under conflict"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"IS",bio:"Isabella helps couples untangle what she grew up watching. She's the most emotionally literate person in most rooms — which is sometimes lonely. She knows when someone is projecting before they do. She wants presence, not performance."},
  {id:10,name:"Yuki",age:24,nat:"South Korean",region:"East Asia",job:"Content Creator",edu:"Bachelor's",attach:"anxious",shadow:"Bullied for appearance throughout middle and high school",traits:["Bubbly on the surface","Insecure underneath","Creative","Craves validation"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"YU",bio:"Yuki has 400k followers and a private journal full of self-doubt. She's learned to perform confidence but still freezes when she thinks someone might be pulling away. She needs someone who sees past the content and talks to the person."},
  {id:11,name:"Amara",age:33,nat:"Ethiopian",region:"Africa",job:"Doctor",edu:"PhD",attach:"secure",shadow:"Grew up in poverty; watched family sacrifice everything for her education",traits:["Resilient","Principled","Warm","Quietly ambitious"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"AM",bio:"Amara carries the weight of a family's hope and wears it lightly. She's generous, grounded, and doesn't complain. But she has needs too — for reciprocity, for someone who gives back. She's learned not to ask for things, which is a problem."},
  {id:12,name:"Clara",age:38,nat:"Spanish",region:"Western Europe",job:"Professor",edu:"PhD",attach:"disorganized",shadow:"Verbally abusive mother who alternated between love and cruelty",traits:["Brilliant","Volatile","Charismatic","Pushes people away when close"],bg:"rgba(150,110,180,0.2)",fg:"#c090e0",initials:"CL",bio:"Clara is the most compelling person in any seminar room — and one of the most difficult to love. She craves closeness and sabotages it. She knows exactly what she's doing and can't stop. She needs patience and steadiness she's never been shown."},
  {id:13,name:"Natasha",age:30,nat:"Ukrainian",region:"Eastern Europe",job:"Product Manager",edu:"Master's",attach:"anxious",shadow:"Displaced by war as a teenager; lost stability overnight",traits:["Resilient","Clingy when scared","Strategic","Emotionally intense"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"NA",bio:"Natasha moved three times in four years and built a career in each city. She's tough externally and terrified of another rupture internally. In relationships, she wants certainty — more than is always possible to give. Handling that gap is the challenge."},
  {id:14,name:"Mei",age:22,nat:"Chinese",region:"East Asia",job:"Student",edu:"Bachelor's",attach:"avoidant",shadow:"Tiger-mom upbringing; love was always conditional on grades",traits:["Intellectually sharp","Private","Dry humor","Slow to trust"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"ME",bio:"Mei is finishing her economics degree and questioning everything she was raised to believe. She's funny in a way that sneaks up on you. She learned early that closeness meant vulnerability to judgment — so she rations it carefully."},
  {id:15,name:"Leila",age:35,nat:"Iranian",region:"Middle East",job:"Engineer",edu:"Master's",attach:"secure",shadow:"Raised in a strict traditional household; fought for her career",traits:["Strong-willed","Romantic at heart","Guarded with strangers","Private about family"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"LE",bio:"Leila crossed a lot of lines to become who she is. She's pragmatic and secretly sentimental. She has clear values and won't bend them for anyone — but she's loyal to people who respect that. She keeps her family life very separate."},
  {id:16,name:"Camille",age:29,nat:"Belgian",region:"Western Europe",job:"Photographer",edu:"Bachelor's",attach:"anxious",shadow:"Chronic illness throughout childhood; felt like a burden",traits:["Artistic","Deeply sensitive","Self-deprecating humor","Hyperaware of being 'too much'"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"CA",bio:"Camille has an eye for light that borders on the spiritual. She's spent years feeling like her needs were inconvenient. Now she either hides them or floods with them. She needs someone who asks, and means it."},
  {id:17,name:"Fatima",age:31,nat:"Moroccan",region:"Middle East",job:"Business Owner",edu:"Bachelor's",attach:"secure",shadow:"Lost a sibling at 15; family was never the same after",traits:["Grounded","Warm humor","Protective","Comfortable with grief"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"FA",bio:"Fatima runs a small textile business in Casablanca and has faced grief most people only read about. It made her practical about what matters and impatient with what doesn't. She's fully present when she's with you."},
  {id:18,name:"Nadia",age:26,nat:"Lebanese",region:"Middle East",job:"Graphic Designer",edu:"Bachelor's",attach:"disorganized",shadow:"Survived a bombing; PTSD not fully processed",traits:["Intense","Artistic","Unpredictable","Moments of striking tenderness"],bg:"rgba(150,110,180,0.2)",fg:"#c090e0",initials:"ND",bio:"Nadia's work is beautiful and unsettling, like she is. She draws from a place she can't fully explain. Her relationships tend to follow a pattern of rapid intimacy followed by sudden distance. She's not sure how to break it."},
  {id:19,name:"Ingrid",age:40,nat:"Swedish",region:"Western Europe",job:"CEO",edu:"MBA",attach:"secure",shadow:"Workaholic parents who were never emotionally present",traits:["Decisive","Cool exterior","Vulnerable in private","High integrity"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"IN",bio:"Ingrid has built something impressive and feels privately hollow about it. She leads 200 people and doesn't have someone to call at midnight. She's learned not to need — which is different from not wanting. She's more open than she appears, to the right person."},
  {id:20,name:"Hana",age:27,nat:"Czech",region:"Eastern Europe",job:"Nurse",edu:"Bachelor's",attach:"anxious",shadow:"Parents' alcoholism; she was the responsible one from age 10",traits:["Fiercely caring","Hypervigilant","Dark sense of humor","Difficulty receiving care"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"HA",bio:"Hana has taken care of everyone her whole life. She's excellent at it and quietly exhausted. She doesn't know how to ask for help without apologizing. Being cared for makes her nervous. Showing her it's safe is the work."},
  {id:21,name:"Simone",age:34,nat:"French",region:"Western Europe",job:"Philosopher",edu:"PhD",attach:"avoidant",shadow:"Raised in a household that valued ideas over feelings",traits:["Cerebral","Emotionally detached","Surprising flashes of warmth","Debates instead of argues"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"SI",bio:"Simone talks about Heidegger the way other people talk about feelings. She's not cold — she processes emotion through abstraction. Getting her to land in her body and speak plainly is both a challenge and a gift."},
  {id:22,name:"Rina",age:23,nat:"Filipino",region:"Southeast Asia",job:"Nurse",edu:"Bachelor's",attach:"secure",shadow:"Extreme poverty; watched parents sacrifice everything",traits:["Joyful","Resourceful","People-pleaser","Struggles to say no"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"RI",bio:"Rina sends money home every month and never mentions it. She's one of the most genuinely warm people you'll meet, and also the most likely to say yes when she means no. She needs someone who helps her practice having needs."},
  {id:23,name:"Valentina",age:37,nat:"Argentine",region:"Latin America",job:"Actress",edu:"Bachelor's",attach:"disorganized",shadow:"Narcissistic father who made her the audience for his life",traits:["Dramatic","Perceptive","Magnetic","Tests and provokes"],bg:"rgba(150,110,180,0.2)",fg:"#c090e0",initials:"VA",bio:"Valentina can read a room in seconds and fill it completely. She's also learned from her father that attention is love — so she performs, provokes, and tests. She doesn't fully trust stillness. When she finds it, she doesn't know what to do."},
  {id:24,name:"Astrid",age:28,nat:"Norwegian",region:"Western Europe",job:"Marine Biologist",edu:"Master's",attach:"secure",shadow:"Near-death experience at 20; shifted her priorities completely",traits:["Grounded","Adventurous","Direct","Not afraid of depth"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"AS",bio:"Astrid nearly drowned during a research dive and woke up different. She stopped worrying about the wrong things. She's relaxed about most things and serious about the ones that count. She'll ask you something real within the first twenty minutes."},
  {id:25,name:"Daphne",age:32,nat:"Greek",region:"Western Europe",job:"Economist",edu:"PhD",attach:"avoidant",shadow:"Family destroyed financially in the 2010 crisis; trust shattered",traits:["Cynical","Fiercely loyal","Secretly romantic","Hides vulnerability behind economics metaphors"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"DA",bio:"Daphne watched her family lose everything. She became an economist to understand it and never quite got over it. She distrusts grand gestures and systems that promise stability. She wants something real and has trouble believing it when she finds it."},
  {id:26,name:"Yara",age:25,nat:"Brazilian",region:"Latin America",job:"Fashion Designer",edu:"Bachelor's",attach:"anxious",shadow:"First boyfriend cheated; found out through Instagram",traits:["Expressive","Jealous tendency","Talented","Checks phones in her head"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"YR",bio:"Yara's designs are confident and sexy. She is too, until doubt creeps in. Her antennae are always up for the signal that it's happening again. She knows this about herself. She doesn't know how to turn it off without feeling naive."},
  {id:27,name:"Fumiko",age:39,nat:"Japanese",region:"East Asia",job:"Translator",edu:"Master's",attach:"avoidant",shadow:"Emotionally absent parents who communicated through formality",traits:["Precise","Quiet","Unexpectedly funny","Reveals self slowly"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"FU",bio:"Fumiko translates between worlds for a living. She speaks four languages and is eloquent in none of them when it comes to her own feelings. She takes time. She's worth it. You will not rush her."},
  {id:28,name:"Aaliya",age:30,nat:"Pakistani",region:"South Asia",job:"Journalist",edu:"Master's",attach:"secure",shadow:"Harassed at work at 22; had to fight to be believed",traits:["Brave","Principled","Appropriately guarded","Clear communicator"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"AA",bio:"Aaliya writes things that make people uncomfortable and doesn't apologize. She's had to fight for her credibility in rooms that didn't want to give it. She's selective about trust — not cold, just calibrated. She respects people who know what they stand for."},
  {id:29,name:"Chiara",age:27,nat:"Italian",region:"Western Europe",job:"Chef",edu:"Vocational",attach:"anxious",shadow:"Family was emotionally explosive — love and conflict were the same thing",traits:["Passionate","Territorial","Loving","Escalates fast"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"CH",bio:"Chiara feeds people as an act of love. Her kitchen is her domain and her relationships follow the same intensity. She doesn't do mild. She has never learned that conflict and love can be separate things — that the argument doesn't have to prove the love."},
  {id:30,name:"Esme",age:35,nat:"British",region:"Western Europe",job:"Journalist",edu:"Master's",attach:"secure",shadow:"Sent to boarding school at 8; learned self-sufficiency as survival",traits:["Witty","Self-reliant","Dry","Privately tender"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"ES",bio:"Esme was raised by a school, effectively. She's extremely good at taking care of herself and quietly starving for the kind of intimacy she never learned was available. She makes herself laugh so you don't have to feel sorry for her."},
  {id:31,name:"Rowan",age:28,nat:"Australian",region:"Oceania",job:"Environmental Consultant",edu:"Master's",attach:"secure",shadow:"Parents' bitter divorce at 12; shared custody felt like negotiation",traits:["Direct","Adventurous","Emotionally open","Good at repair"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"RO",bio:"Rowan grew up in two houses and became very good at reading rooms. She's not damaged by it — she learned early that rupture and repair are both possible. She's comfortable with difficult conversations and expects them to go somewhere useful."},
  {id:32,name:"Bea",age:24,nat:"South African",region:"Africa",job:"Dancer",edu:"Bachelor's",attach:"anxious",shadow:"Racial trauma; felt unsafe in her own country growing up",traits:["Expressive","Spiritual","Reactive","Processing a lot"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"BE",bio:"Bea moves through the world with her whole body. She's in a constant renegotiation between who she is and what the world reflects back. Her anxiety isn't neurotic — it's informed. She needs someone who takes that seriously without making it about them."},
  {id:33,name:"Lucía",age:33,nat:"Mexican",region:"Latin America",job:"Architect",edu:"Master's",attach:"avoidant",shadow:"Raised by cold, self-sufficient grandmother after mother left",traits:["Self-sufficient","Creative","Stubborn","Confuses needing help with weakness"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"LU",bio:"Lucía designs buildings that outlast the people who commission them. She's not interested in temporary things. Her relationships have a pattern: strong start, then a slow withdrawal when things get real. She thinks she prefers it that way. She doesn't."},
  {id:34,name:"Nour",age:26,nat:"Algerian",region:"Middle East",job:"Teacher",edu:"Master's",attach:"secure",shadow:"Lost her father at 10; became the emotional anchor for her family",traits:["Caring","Idealistic","Can be preachy","Deep loyalty"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"NO",bio:"Nour holds her students together the way she held her family together. She's a natural caretaker with a sharp mind. She wants to be idealized a little less and known a little more. She's more complicated than she lets on in the teacher-mode."},
  {id:35,name:"Selin",age:31,nat:"Turkish",region:"Middle East",job:"Therapist",edu:"PhD",attach:"secure",shadow:"Grew up in an environment that restricted her gender expression",traits:["Insightful","Feminist","Warm","Calls things what they are"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"SE",bio:"Selin has helped other people understand their patterns long enough to understand her own very well. She's not looking for someone to fix or be fixed by. She wants a relationship with someone who can be honest and handle her being honest back."},
  {id:36,name:"Lena",age:22,nat:"German",region:"Western Europe",job:"Student",edu:"Bachelor's",attach:"anxious",shadow:"Bullied for weight throughout teenage years",traits:["Intellectual","Self-conscious about her body","Funny","Disarms with humor"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"LN",bio:"Lena reads philosophy and makes the people around her laugh. She's smart enough to analyze her insecurities and not quite able to outthink them. She'll make a joke exactly when she's most scared. Catching that is the invitation."},
  {id:37,name:"Amira",age:38,nat:"Tunisian",region:"Middle East",job:"Human Rights Lawyer",edu:"PhD",attach:"avoidant",shadow:"Witnessed political violence as a child; learned not to rely on institutions or people",traits:["Fierce","Independent","Secretly lonely","Judges quickly"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"AR",bio:"Amira has seen what happens when systems fail people. She's made herself impossible to fail by needing as little as possible. She's sharp, important, and privately one of the loneliest people she knows. She'd never say so."},
  {id:38,name:"Hira",age:25,nat:"Sri Lankan",region:"South Asia",job:"Software Engineer",edu:"Bachelor's",attach:"secure",shadow:"Intense academic pressure; worth tied to performance for years",traits:["Logical","Gentle","Curious","Comfortable with uncertainty"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"HI",bio:"Hira untangled herself from the performance trap early enough to still be curious. She approaches relationships the way she approaches code — with genuine interest in understanding how things work. She's patient and not easily rattled."},
  {id:39,name:"Vika",age:29,nat:"Belarusian",region:"Eastern Europe",job:"Translator",edu:"Master's",attach:"disorganized",shadow:"Political upheaval shattered her sense of stability in her early 20s",traits:["Quick-witted","Cautious","Intense","Oscillates between closeness and distance"],bg:"rgba(150,110,180,0.2)",fg:"#c090e0",initials:"VI",bio:"Vika has watched her country change in ways she can't fully process. She translates other people's words for a living and sometimes can't find her own. She moves fast toward people then wonders if she should have. The pattern exhausts her."},
  {id:40,name:"Olga",age:40,nat:"Russian",region:"Eastern Europe",job:"Novelist",edu:"Master's",attach:"avoidant",shadow:"Raised by grandparents after parents' early death; never bonded fully with anyone",traits:["Philosophical","Cold exterior","Deeply loyal","Writes what she can't say"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"OL",bio:"Olga's novels are love letters she couldn't deliver in person. She's constructed an intellectual fortress and lives there comfortably. The people who've gotten inside say it was worth it. She doesn't make it easy."},
  {id:41,name:"Carmen",age:36,nat:"Colombian",region:"Latin America",job:"Nurse",edu:"Bachelor's",attach:"anxious",shadow:"Domestic violence in the home; learned love involves danger",traits:["Warm","Hypervigilant","Resilient","Confuses intensity with love"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"CR",bio:"Carmen is the most attentive nurse on her floor and the most worried person in any relationship. She grew up where love and threat lived in the same body. She's working to separate them. Calm, consistent presence helps more than grand declarations."},
  {id:42,name:"Hemi",age:27,nat:"Māori / New Zealand",region:"Oceania",job:"Artist",edu:"Bachelor's",attach:"secure",shadow:"Cultural identity crisis between Māori heritage and Western assimilation",traits:["Spiritual","Expressive","Grounded","Protective of her culture"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"HE",bio:"Hemi paints to keep her ancestors present. She lives between two worlds and has made peace with that — mostly. She's warm and generous and won't let someone diminish where she comes from, even accidentally. Ask and mean it."},
  {id:43,name:"Joanna",age:34,nat:"British",region:"Western Europe",job:"Barrister",edu:"Master's",attach:"avoidant",shadow:"Emotionally unavailable parents who showed love through provision, never presence",traits:["Sharp","Sarcastic","Needs validation but won't ask","Argues instead of feeling"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"JO",bio:"Joanna wins arguments for a living and uses the same skill in her personal life. She's terrifyingly competent and privately convinced no one would stay if they saw her without the competence. She makes herself impossible to criticize so she never has to feel criticized."},
  {id:44,name:"Seun",age:28,nat:"Ghanaian",region:"Africa",job:"Investment Banker",edu:"Master's",attach:"secure",shadow:"Grew up in poverty; drove herself through education alone",traits:["Ambitious","Genuinely joyful","Community-minded","High standards for herself and others"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"SN",bio:"Seun made it and hasn't forgotten where from. She's ambitious without being ruthless, successful without being hollow. She knows what she wants in a partner and says it. She doesn't have time for people who can't keep up emotionally."},
  {id:45,name:"Asel",age:23,nat:"Kazakh",region:"Eastern Europe",job:"Student",edu:"Bachelor's",attach:"anxious",shadow:"Isolated childhood in a small town; loneliness was the norm",traits:["Curious","Emotionally needy","Bright","Wants connection intensely"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"AX",bio:"Asel moved to the city for university and found the world enormous. She wants everything at once — connection, understanding, adventure. Her neediness is endearing and also a lot. She's learning to slow down and trust that people will stay."},
  {id:46,name:"Birgitta",age:39,nat:"Danish",region:"Western Europe",job:"Architect",edu:"Master's",attach:"secure",shadow:"Watched her sibling struggle with addiction for a decade",traits:["Calm","Pragmatic","Deeply kind","Doesn't panic"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"BI",bio:"Birgitta has been the steady one for so long it's become her identity. She's not a martyr about it — she just knows how to stay. She brings that to relationships too: she doesn't run from difficulty. She wants someone who can do the same."},
  {id:47,name:"Roxana",age:32,nat:"Romanian",region:"Eastern Europe",job:"Product Designer",edu:"Bachelor's",attach:"disorganized",shadow:"Emotional neglect disguised as normalcy",traits:["Creative","Unpredictable","Magnetic","Alternates between craving and pushing away"],bg:"rgba(150,110,180,0.2)",fg:"#c090e0",initials:"RX",bio:"Roxana's portfolio is stunning and her relationships tend to follow the same arc: beautiful opening, structural collapse. She's not doing it on purpose. She just learned that getting close meant getting hurt — and her nervous system hasn't updated."},
  {id:48,name:"Sun-Li",age:26,nat:"Chinese",region:"East Asia",job:"Accountant",edu:"Master's",attach:"avoidant",shadow:"Failed an important exam at 18; treated as family failure",traits:["Reserved","Witty in private","Compartmentalizes","Doesn't discuss family"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"SL",bio:"Sun-Li keeps her personal life in a separate drawer from everything else. She's not cold — she's organized. She'll tell you something real exactly once and gauge everything by how you handle it. Pass that test and something opens."},
  {id:49,name:"Pita",age:30,nat:"Tongan",region:"Oceania",job:"Social Worker",edu:"Bachelor's",attach:"secure",shadow:"Community shame around her family's circumstances growing up",traits:["Grounded","Protective","Funny","Knows the difference between helping and enabling"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"PI",bio:"Pita has good boundaries because she learned the hard way what happens without them. She's generous and won't be taken advantage of. She's funny with people she trusts and quiet with people she's reading. Give her time to read you."},
  {id:50,name:"Divya",age:33,nat:"Indian",region:"South Asia",job:"Finance Director",edu:"MBA",attach:"anxious",shadow:"Pressured into early engagement at 24; broke it off; family fallout",traits:["Driven","Overthinks","Empathetic","Second-guesses her own wants"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"DI",bio:"Divya made one decision against her family and it cost her more than she lets on. Now she's careful — sometimes too careful. She analyzes her feelings to death and wonders if she's allowed to want what she wants. She is."},
  {id:51,name:"Nala",age:24,nat:"Kenyan",region:"Africa",job:"Biologist",edu:"Master's",attach:"secure",shadow:"Community torn apart by tribal conflict when she was a teen",traits:["Passionate","Principled","Determined","Believes in people's capacity to change"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"NL",bio:"Nala studies ecosystems and thinks in systems. She came through collective trauma and came out believing in human possibility. She's not naïve about it — she's chosen it deliberately. She looks for that quality in people too."},
  {id:52,name:"Mara",age:37,nat:"Croatian",region:"Eastern Europe",job:"Surgeon",edu:"PhD",attach:"avoidant",shadow:"Family pressure to be exceptional; never given space to be ordinary",traits:["Precise","Aloof on the surface","Quietly caring","Exhausted by performance"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"MR",bio:"Mara has been performing excellence since she was six. In her personal life, she doesn't know how to stop. She's detached because she's tired. What she needs most is someone who lets her be mediocre for an evening and loves her anyway."},
  {id:53,name:"Yui",age:22,nat:"Japanese",region:"East Asia",job:"Student",edu:"Bachelor's",attach:"anxious",shadow:"Lost a close friend to suicide at 18",traits:["Sensitive","Overthinks","Creative","Carries survivor's guilt"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"YI",bio:"Yui makes beautiful, melancholy art and checks on her friends obsessively. Her anxiety has a face: she thinks something terrible can happen at any moment. She needs gentleness and steadiness, not cheerfulness. Don't tell her everything's fine."},
  {id:54,name:"Lara",age:35,nat:"Serbian",region:"Eastern Europe",job:"Journalist",edu:"Master's",attach:"secure",shadow:"Post-war cultural trauma; grew up navigating national grief",traits:["Brave","Dark humor","Loyal","Comfortable with hard truths"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"LA",bio:"Lara jokes about things that aren't funny because she learned it helps. She's honest, sometimes bruisingly so, and she respects people who are honest back. She's one of the most present people in a room — war teaches you to pay attention."},
  {id:55,name:"Anika",age:28,nat:"Dutch",region:"Western Europe",job:"HR Director",edu:"Master's",attach:"secure",shadow:"Perfectionist household; love contingent on being low-maintenance",traits:["Fair","Assertive","Warm","Excellent at boundaries"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"AK",bio:"Anika manages 60 people and is genuinely good at it. She's clear, fair, and doesn't play games. She applied the same standard to relationships — which means she'll tell you when something doesn't work and she expects the same. She finds vagueness exhausting."},
  {id:56,name:"Catalina",age:31,nat:"Chilean",region:"Latin America",job:"Marine Biologist",edu:"PhD",attach:"avoidant",shadow:"Mother died when she was 16; never fully grieved",traits:["Independent","Melancholic","Adventurous","Keeps people at a slight distance"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"CT",bio:"Catalina went into marine biology because the ocean doesn't need anything from you. She's adventurous and self-contained. There's a sadness she doesn't discuss. If you sit with her long enough without filling the silence, she might."},
  {id:57,name:"Tina",age:26,nat:"Vietnamese",region:"Southeast Asia",job:"Fashion Designer",edu:"Bachelor's",attach:"anxious",shadow:"Refugee family; grew up carrying parents' unprocessed trauma",traits:["Hardworking","Emotional","Funny","Carries weight she didn't choose"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"TI",bio:"Tina grew up translating — not just language but worlds. Her parents' fear became her hypervigilance. She designs things that feel free because she spent years feeling the opposite. She laughs too loud when she's nervous. It's how you'll know."},
  {id:58,name:"Reina",age:33,nat:"Spanish",region:"Western Europe",job:"Flamenco Dancer",edu:"Vocational",attach:"disorganized",shadow:"Unstable childhood; home moved between relatives",traits:["Magnetic","Volatile","Tender in unexpected moments","Lives in the present"],bg:"rgba(150,110,180,0.2)",fg:"#c090e0",initials:"RE",bio:"Reina is all fire and then suddenly all stillness. She learned to live in the moment because the future was never reliable. She's intoxicating to be around and destabilizing to love. She's not trying to be either. It's just all she knows."},
  {id:59,name:"Kiri",age:29,nat:"Māori / New Zealand",region:"Oceania",job:"Counselor",edu:"Master's",attach:"secure",shadow:"Family member's substance abuse; she became the anchor",traits:["Perceptive","Grounded","Funny","Doesn't project her work onto her life"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"KI",bio:"Kiri is good at her work and knows how to leave it at the door. She's steady without being boring, perceptive without being a therapist about it. She likes people who are complicated and can sit with complexity."},
  {id:60,name:"Sasha",age:25,nat:"Ukrainian",region:"Eastern Europe",job:"Software Developer",edu:"Bachelor's",attach:"avoidant",shadow:"Grew up in a conflict zone; learned independence as survival",traits:["Logical","Dry","Brave","Expresses care through acts not words"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"SA",bio:"Sasha fixes things. In code, in life — it's her instinct. She's not great at talking about feelings but she'll show up at 2am with tools if something is broken. Learn to read her actions. They're more honest than most people's words."},
  {id:61,name:"Adaeze",age:30,nat:"Nigerian",region:"Africa",job:"Lawyer",edu:"Master's",attach:"secure",shadow:"Gender discrimination throughout her career",traits:["Fierce","Strategic","Warm to those she trusts","High tolerance for no-nonsense"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"AD",bio:"Adaeze has had to fight for every seat she's earned. She's done with proving herself to people who've already decided. With people she trusts, she's open and funny and generous. Getting there requires demonstrating you're worth the energy."},
  {id:62,name:"Elif",age:27,nat:"Turkish",region:"Middle East",job:"Photographer",edu:"Bachelor's",attach:"anxious",shadow:"Family repressed emotion; feelings were never named or discussed",traits:["Artistic","Moody","Loving","Doesn't have vocabulary for her own feelings"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"EF",bio:"Elif photographs what she can't say. Her pictures are full of longing. She's learned the shape of her feelings without the words — which means she needs a partner who can help her find them without making her feel stupid."},
  {id:63,name:"Ines",age:38,nat:"Portuguese",region:"Western Europe",job:"Winemaker",edu:"Vocational",attach:"secure",shadow:"Financial hardship; worked from 16",traits:["Earthy","Sensual","Direct","Comfortable with time"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"IE",bio:"Ines has been making wine in the Douro valley for fifteen years. She knows good things take time and she's not in a hurry. She's direct, physical, and at home in her body. She doesn't perform. She's exactly what you see."},
  {id:64,name:"Jung-Eun",age:32,nat:"South Korean",region:"East Asia",job:"Software Engineer",edu:"Master's",attach:"avoidant",shadow:"Extreme academic pressure; no time or permission for emotional life",traits:["Quiet","Precise","Dry sense of humor","Processes slowly"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"JE",bio:"Jung-Eun's engineering is elegant. So is her conversational style — minimal and precise. She's not cold, she's careful. She'll send you something funny at 11pm that took her an hour to phrase. It means more than it looks like."},
  {id:65,name:"Maya",age:24,nat:"Israeli",region:"Middle East",job:"Student",edu:"Bachelor's",attach:"anxious",shadow:"Mandatory military service; processed things she shouldn't have had to",traits:["Smart","Hyperaware","Funny","Doesn't trust easily but trusts fully"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"MY",bio:"Maya carries more than most 24-year-olds. She's funny and sharp and has a radar for sincerity that's been calibrated under pressure. She's not broken by what she's seen — she's just very awake. She needs someone who can be equally awake."},
  {id:66,name:"Zoe",age:36,nat:"Australian",region:"Oceania",job:"Entrepreneur",edu:"MBA",attach:"secure",shadow:"Ended her marriage at 28; rebuilt completely",traits:["Self-aware","Adventurous","Warm","Has done the work"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"ZO",bio:"Zoe left a marriage that looked good and felt empty. It was the hardest and best thing she's done. She knows herself well — the good and the difficult. She's not looking for someone to complete her. She's looking for someone interesting to build with."},
  {id:67,name:"Blessing",age:23,nat:"South African",region:"Africa",job:"Student",edu:"Bachelor's",attach:"anxious",shadow:"Community violence normalized throughout childhood",traits:["Spiritual","Expressive","Ambitious","Heals through community"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"BL",bio:"Blessing is studying social work to give back what she didn't get. She's young and certain and still working out where anxiety ends and intuition begins. She wants to be held, in the full sense — to have someone understand the weight she carries."},
  {id:68,name:"Ranya",age:34,nat:"Egyptian",region:"Middle East",job:"Academic",edu:"PhD",attach:"avoidant",shadow:"Controlling ex-husband; divorced at 30 and started over",traits:["Intellectual","Guarded","Surprising wit","Gives nothing away until she trusts"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"RY",bio:"Ranya rebuilt her life after 30 and she's proud of it. She's not bitter but she is careful. She's brilliant in ways that can feel intimidating and she uses that somewhat deliberately to keep distance. Showing up consistently matters more than anything clever you say."},
  {id:69,name:"Petra",age:29,nat:"Slovak",region:"Eastern Europe",job:"Nurse",edu:"Bachelor's",attach:"secure",shadow:"Religious upbringing that made guilt and love synonymous",traits:["Compassionate","Direct","Curious","Working through inherited guilt"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"PE",bio:"Petra left the church and kept the ethics. She cares genuinely about people without the moral framework that used to run it. She's in a transition she can articulate clearly, which is rare. She wants someone present enough to have those conversations."},
  {id:70,name:"Noa",age:26,nat:"Israeli",region:"Middle East",job:"UX Researcher",edu:"Master's",attach:"secure",shadow:"Anxiety disorder since 16; learned to live alongside it",traits:["Empathetic","Structured","Playful","Honest about her limits"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"NA",bio:"Noa knows exactly what she needs and asks for it without drama. She's made anxiety into a teacher rather than an enemy. She's one of the easiest people to talk to and one of the most careful about who she lets in. Both things are true."},
  {id:71,name:"Miriam",age:40,nat:"Austrian",region:"Western Europe",job:"Psychiatrist",edu:"PhD",attach:"secure",shadow:"Depressed parent; caretaking was her childhood job",traits:["Grounded","Analytical","Compassionate","Good at not over-functioning"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"MM",bio:"Miriam knows what over-functioning looks like from the inside and has stopped doing it. She's warm and boundaried and doesn't make people's feelings her emergency. She's looking for someone equally regulated — not because she's cold, but because she knows what the alternative costs."},
  {id:72,name:"Layla",age:22,nat:"Jordanian",region:"Middle East",job:"Student",edu:"Bachelor's",attach:"anxious",shadow:"Strict gender norms; always told her wants were wrong",traits:["Dreamy","Romantic","Conflicted about what she's allowed to want","Passionate"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"LL",bio:"Layla reads novels the way other people pray. She's romantic and conflicted and twenty-two in a way that's both beautiful and difficult. She's still learning that her desires are legitimate. She needs someone who takes that seriously without rushing it."},
  {id:73,name:"Agata",age:31,nat:"Polish",region:"Eastern Europe",job:"Filmmaker",edu:"Master's",attach:"disorganized",shadow:"Chaotic artistic household; love was present and overwhelming",traits:["Intense","Visionary","Unpredictable","Capable of extraordinary intimacy and sudden withdrawal"],bg:"rgba(150,110,180,0.2)",fg:"#c090e0",initials:"AG",bio:"Agata makes films about the thing she can't quite reach in life: stable love. She knows it. The irony is not lost on her. She's luminous in ways that are hard to describe and difficult to sustain proximity to. She keeps trying."},
  {id:74,name:"Jess",age:35,nat:"American",region:"North America",job:"Writer",edu:"Master's",attach:"anxious",shadow:"Father left when she was 5; mother never got over it",traits:["Witty","Over-explains when scared","Empathetic","Writes to process everything"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"JS",bio:"Jess turns everything into a story — including what's happening right now. She's charming and exhausting in equal measure when she's anxious. When she's calm, she's one of the best listeners you'll encounter. Help her feel safe enough to be calm."},
  {id:75,name:"Dana",age:28,nat:"Canadian",region:"North America",job:"Psychologist",edu:"PhD",attach:"secure",shadow:"Parents' cold, functional divorce at 14",traits:["Insightful","Measured","Secretly goofy","Good at naming things"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"DN",bio:"Dana is not her job in her personal life. She's genuinely goofy and warm with people she trusts. She just has more language for what's happening than most. She's not looking to analyze you — she's looking to know you. Those are different things."},
  {id:76,name:"Rosa",age:33,nat:"Puerto Rican",region:"North America",job:"Social Worker",edu:"Master's",attach:"secure",shadow:"Grew up surrounded by poverty and violence; channeled it into purpose",traits:["Fierce advocate","Warm","Resilient","Doesn't tolerate cruelty or indifference"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"RS",bio:"Rosa has made her life about standing between vulnerable people and the things that hurt them. She's tough and tender. She expects the people in her personal life to at least try to see the world. Wilful ignorance is a dealbreaker."},
  {id:77,name:"Kezia",age:27,nat:"Ethiopian",region:"Africa",job:"Textile Designer",edu:"Bachelor's",attach:"anxious",shadow:"Pressured toward early marriage; resisted, but at a cost",traits:["Creative","Intense","Warm","Worries about disapproval"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"KZ",bio:"Kezia designs fabric with traditional patterns and contemporary forms — a kind of synthesis she's still working out in her personal life. She chose her path and is still uncertain she was allowed to. She needs people who confirm it without being told to."},
  {id:78,name:"Ting",age:30,nat:"Taiwanese",region:"East Asia",job:"Biotech Researcher",edu:"PhD",attach:"avoidant",shadow:"Expected to follow family path; broke from it silently",traits:["Precise","Stoic","Surprisingly playful","Shows up through reliability not words"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"TG",bio:"Ting does what she says she'll do. Always. That's her version of love — showing up, on time, with what was needed. She's not expressive. She's consistent. You have to learn to read the language. It's worth learning."},
  {id:79,name:"Milena",age:24,nat:"Bulgarian",region:"Eastern Europe",job:"Student",edu:"Bachelor's",attach:"anxious",shadow:"Parentified by mother's mental illness from a young age",traits:["Caring","Parentified","Smart","Difficulty knowing what she needs"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"ML",bio:"Milena has been taking care of someone her entire life. She's extraordinarily attuned to other people's needs and almost completely unaware of her own. She doesn't know what she wants because she was never asked. Start by asking."},
  {id:80,name:"Grace",age:38,nat:"Singaporean",region:"East Asia",job:"Investment Banker",edu:"MBA",attach:"avoidant",shadow:"Hyper-competitive upbringing; vulnerability associated with failure",traits:["Efficient","Guarded","Generous in private","Struggles to slow down"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"GR",bio:"Grace optimizes everything, including herself. She's aware of the cost of that and not sure how to stop. In private she's generous in ways that surprise people who only see the professional version. Getting to that layer requires her to trust you won't use it."},
  {id:81,name:"Paula",age:32,nat:"Venezuelan",region:"Latin America",job:"Doctor",edu:"PhD",attach:"secure",shadow:"Political exile; lost her country twice — once to crisis, once to leaving",traits:["Resilient","Empathetic","Determined","Mourning in the background"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"PL",bio:"Paula grieved a country and kept moving. She carries it without letting it weigh others down, which is noble and lonely. She's warm and capable and secretly tired of being the strong one. She wants someone who asks how she actually is."},
  {id:82,name:"Fumi",age:25,nat:"Ghanaian",region:"Africa",job:"Musician",edu:"Vocational",attach:"secure",shadow:"Family home destroyed by fire when she was 10; rebuilt twice",traits:["Joyful","Grounded","Expressive","Loss made her live forward not backward"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"FM",bio:"Fumi plays music because she needs to. She's one of the most alive people in any room — not in a performed way, but in a genuine one. Loss taught her that time is not guaranteed. She doesn't waste it on people who aren't real with her."},
  {id:83,name:"Adina",age:29,nat:"Romanian",region:"Eastern Europe",job:"Nurse",edu:"Bachelor's",attach:"anxious",shadow:"Unstable parent; constant vigilance as a child",traits:["Caring","Overthinks every interaction","Funny","Asks if you're okay constantly"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"AI",bio:"Adina notices when the mood in a room shifts before anyone speaks. She's been reading signals her whole life. She's warm and she's exhausting — not because she means to be but because her nervous system hasn't learned it's okay to rest. Calm her down slowly."},
  {id:84,name:"Asha",age:34,nat:"Somali",region:"Africa",job:"Poet",edu:"Bachelor's",attach:"disorganized",shadow:"Refugee experience; safety and home feel abstract",traits:["Poetic","Intense","Warm","Doesn't always know how to stay"],bg:"rgba(150,110,180,0.2)",fg:"#c090e0",initials:"AH",bio:"Asha has been a stranger in several countries and writes from that in-between place. She's one of the most profound conversationalists you'll meet. She also disappears. Not cruelly — she just sometimes needs to go away and she doesn't have words for when or why."},
  {id:85,name:"Lotte",age:27,nat:"Dutch",region:"Western Europe",job:"Illustrator",edu:"Bachelor's",attach:"secure",shadow:"Chronic illness throughout childhood and adolescence",traits:["Creative","Positive without being toxic","Good boundaries","Knows her limits"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"LO",bio:"Lotte learned early what she could and couldn't control. It gave her unusual equanimity. She's creative and grounded and has very little patience for drama because she's spent too much energy dealing with things that actually matter. She's one of the good ones."},
  {id:86,name:"Vera",age:36,nat:"Bulgarian",region:"Eastern Europe",job:"Historian",edu:"PhD",attach:"avoidant",shadow:"Family politically repressed; learned never to trust external systems",traits:["Precise","Withholds warmth until certain","Intellectually generous","Privately wry"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"VE",bio:"Vera studies how systems of power shape ordinary lives and has spent her own life avoiding entrapment. She's suspicious of easy warmth and responds to consistency over time. She'll tell you a joke that takes a second to land. When it does, you've made progress."},
  {id:87,name:"Precious",age:23,nat:"Zambian",region:"Africa",job:"Student",edu:"Bachelor's",attach:"anxious",shadow:"Orphaned at 14; raised by extended family",traits:["Resilient","Spiritual","Emotional","Searches for permanence"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"PC",bio:"Precious prays and studies and doesn't ask for much. She's learned not to rely on things staying. She wants, very quietly, someone who proves her wrong about that. She won't say it directly. Listen for it in the silences."},
  {id:88,name:"Ji-Yeon",age:31,nat:"South Korean",region:"East Asia",job:"Surgeon",edu:"PhD",attach:"avoidant",shadow:"Suicidal depression at 20; fought back alone",traits:["Strong","Deeply private","Dry wit","Has earned her equilibrium"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"JY",bio:"Ji-Yeon pulled herself out of somewhere dark without much help. She doesn't talk about it and she doesn't need you to talk about it either. What she needs is someone who doesn't require her to perform happiness. Someone who can sit with her in the quiet."},
  {id:89,name:"Anna",age:35,nat:"Finnish",region:"Western Europe",job:"Landscape Architect",edu:"Master's",attach:"secure",shadow:"Cold northern upbringing where emotion was private by cultural norm",traits:["Calm","Dry humor","Reliable","Shows love through doing"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"AN",bio:"Anna designs natural spaces that allow feeling without demanding it. She's the same in relationships. She won't push or perform. She'll show up, on time, with something practical, and mean everything by it. She needs a partner who reads that fluently."},
  {id:90,name:"Reem",age:28,nat:"Emirati",region:"Middle East",job:"Entrepreneur",edu:"MBA",attach:"anxious",shadow:"Family reputation and expectation crushing since childhood",traits:["Ambitious","Performs confidence","Genuine underneath the performance","Needs to be seen past the surface"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"RM",bio:"Reem runs a wellness brand and is excellent at presenting ease. Inside she's still the girl who couldn't fail publicly. She needs someone who sees the person underneath the brand — who asks about the doubt, not just the success."},
  {id:91,name:"Tamara",age:37,nat:"Israeli",region:"Middle East",job:"Therapist",edu:"Master's",attach:"secure",shadow:"Dealt with army trauma that took years to process",traits:["Warm","Direct","Self-aware","Doesn't mistake insight for healing"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"TM",bio:"Tamara knows the difference between understanding something and living through it. She's done both. She's one of the warmest people you'll meet and one of the most honest. She has no interest in comfortable lies — even when the truth is harder."},
  {id:92,name:"Lila",age:22,nat:"American",region:"North America",job:"Student",edu:"Bachelor's",attach:"disorganized",shadow:"Emotional abuse from a parent; still processing",traits:["Bright","Reactive when triggered","Loving","Building herself from scratch"],bg:"rgba(150,110,180,0.2)",fg:"#c090e0",initials:"LI",bio:"Lila is 22 and actively becoming someone new. She's brilliant and tender and can flip into defensiveness in a second when something touches the wound. She's not the wound — she's the person working on it. That distinction matters enormously."},
  {id:93,name:"Nkechi",age:30,nat:"Nigerian",region:"Africa",job:"Economist",edu:"Master's",attach:"secure",shadow:"Social injustice shaped her view of systems from childhood",traits:["Analytical","Witty","Grounded","Won't let things slide she believes matter"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"NK",bio:"Nkechi models economic inequality and will tell you exactly what she thinks about dinner within the first hour. She's warm and funny and has non-negotiables. Not many, but real ones. She respects people who have their own."},
  {id:94,name:"Cleo",age:26,nat:"British",region:"Western Europe",job:"Comedian",edu:"Bachelor's",attach:"anxious",shadow:"Parents' alcoholism; used humor to survive childhood",traits:["Hilarious","Hides pain in plain sight","Lovable","Struggles to be serious"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"CL",bio:"Cleo makes everyone laugh and makes sure no one looks too closely. She's one of the funniest people in any room and one of the hardest to actually know. When she drops the bit, something real is there. Getting her to drop it is the work."},
  {id:95,name:"Zainab",age:32,nat:"Pakistani",region:"South Asia",job:"NGO Director",edu:"Master's",attach:"secure",shadow:"Honor-culture pressure that punished women for visibility",traits:["Courageous","Warm","Principled","Fought hard to exist on her own terms"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"ZB",bio:"Zainab chose a visible career in a context where visibility was punished. She's paid for that in ways she doesn't detail. She's clear about who she is and what she'll stand for. She's looking for someone whose character she respects, not just someone who's impressive."},
  {id:96,name:"Elsa",age:29,nat:"Swedish",region:"Western Europe",job:"Marine Engineer",edu:"Master's",attach:"avoidant",shadow:"Lost her closest friend suddenly at 24; closed something off",traits:["Quiet","Technical","Unexpectedly deep","Expresses via presence not words"],bg:"rgba(90,126,160,0.2)",fg:"#80aad0",initials:"EX",bio:"Elsa closed something when she lost her friend and hasn't fully opened it since. She's competent and self-sufficient. She'll be there. She just won't always say why. Someone patient enough to stay without explanation might help her remember it's safe to open again."},
  {id:97,name:"Bruna",age:34,nat:"Brazilian",region:"Latin America",job:"Journalist",edu:"Master's",attach:"anxious",shadow:"Narcissistic ex who rewrote her perception of reality",traits:["Passionate","Suspicious","Charming","Checks for gaslighting in retrospect"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"BR",bio:"Bruna's last relationship left her questioning her own memory. She's rebuilt her confidence and still flinches at certain patterns. She's not paranoid — she's calibrated. Demonstrating that what you say matches what you do is the only language that works."},
  {id:98,name:"Mina",age:25,nat:"Iranian",region:"Middle East",job:"Student",edu:"Bachelor's",attach:"disorganized",shadow:"Political repression; lived under surveillance and censorship",traits:["Intelligent","Complex","Brave","Never quite certain who she can trust"],bg:"rgba(150,110,180,0.2)",fg:"#c090e0",initials:"MN",bio:"Mina has lived a double life for years — what she says publicly and what she thinks privately. She's brilliant and tired and brave in a way that few people her age can imagine. She finds it hard to trust, not as a character flaw but as a survival skill she can't switch off."},
  {id:99,name:"Linh",age:31,nat:"Vietnamese",region:"Southeast Asia",job:"Software Engineer",edu:"Master's",attach:"secure",shadow:"Family sacrificed everything as immigrants; she carries that debt",traits:["Grounded","Logical","Quietly romantic","Carries intergenerational weight with grace"],bg:"rgba(90,158,122,0.2)",fg:"#7ec4a0",initials:"LH",bio:"Linh sends home half her salary and tells no one. She's practical and privately full of feeling. She doesn't romanticize her story. She just lives it carefully. She's looking for someone who takes her seriously — the work and the quiet self underneath it."},
  {id:100,name:"Wren",age:27,nat:"American",region:"North America",job:"Environmental Lawyer",edu:"Master's",attach:"anxious",shadow:"Parents fought over custody her whole childhood; she learned to manage their conflict",traits:["Idealistic","Anxious","Principled","Over-responsible for others' emotional states"],bg:"rgba(192,97,74,0.2)",fg:"#e09080",initials:"WR",bio:"Wren has been managing people's feelings since she was small. She's principled and passionate and still working out that other people's emotions are not her job to fix. She wants to stop being the responsible one for five minutes. Let her."}
];

const SCENARIOS = [
  {id:"first_date",label:"First date",icon:"☕",desc:"Getting to know each other over coffee or drinks"},
  {id:"deep_convo",label:"Deep conversation",icon:"🌙",desc:"Late night — the masks have come down"},
  {id:"conflict",label:"Conflict",icon:"⚡",desc:"Something went wrong and needs to be addressed"},
  {id:"vulnerability",label:"Opening up",icon:"🤍",desc:"One of you shares something real and risky"},
  {id:"commitment",label:"Commitment talk",icon:"🔮",desc:"The future has come up — where is this going?"},
  {id:"long_distance",label:"Long distance",icon:"✈️",desc:"You're apart and the distance is weighing on things"},
];

let state = {
  persona: null,
  scenario: "first_date",
  history: [],
  sessions: JSON.parse(localStorage.getItem("sessions")||"[]"),
};

function goScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll("#chat-screen,#feedback-screen").forEach(s => {
    s.style.display = "none";
    s.classList.remove("active");
  });
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  if (id === "chat-screen") {
    document.getElementById("chat-screen").style.display = "flex";
    document.getElementById("chat-screen").classList.add("active");
  } else if (id === "feedback-screen") {
    document.getElementById("feedback-screen").style.display = "block";
    document.getElementById("feedback-screen").classList.add("active");
  } else {
    const el = document.getElementById(id);
    if (el) el.classList.add("active");
    if (id === "browse") document.getElementById("tab-browse").classList.add("active");
    if (id === "progress") { document.getElementById("tab-progress").classList.add("active"); renderProgress(); }
  }
}

function getAgeRange(p) {
  return p.age < 30 ? "20s" : p.age < 40 ? "30s" : "40s";
}

function renderGrid() {
  const q = document.getElementById("search").value.toLowerCase();
  const fa = document.getElementById("fAge").value;
  const ft = document.getElementById("fAttach").value;
  const fr = document.getElementById("fRegion").value;
  const filtered = PERSONAS.filter(p => {
    if (q && !p.name.toLowerCase().includes(q) && !p.nat.toLowerCase().includes(q) && !p.job.toLowerCase().includes(q) && !p.region.toLowerCase().includes(q)) return false;
    if (fa && getAgeRange(p) !== fa) return false;
    if (ft && p.attach !== ft) return false;
    if (fr && p.region !== fr) return false;
    return true;
  });
  document.getElementById("count-bar").textContent = `${filtered.length} personas`;
  document.getElementById("grid").innerHTML = filtered.map(p => `
    <div class="pcard" onclick="openDetail(${p.id})">
      <div class="pcard-avatar" style="background:${p.bg};color:${p.fg}">${p.initials}</div>
      <div class="pcard-name">${p.name}, ${p.age}</div>
      <div class="pcard-sub">${p.nat} · ${p.job}</div>
      <div class="pcard-chips">
        <span class="chip chip-attach-${p.attach}">${p.attach}</span>
        <span class="chip" style="background:rgba(255,255,255,0.05);color:var(--text3)">${p.edu}</span>
      </div>
    </div>
  `).join("");
}

function openDetail(id) {
  state.persona = PERSONAS.find(p => p.id === id);
  state.scenario = "first_date";
  const p = state.persona;
  document.getElementById("detail-card").innerHTML = `
    <div class="detail-avatar" style="background:${p.bg};color:${p.fg}">${p.initials}</div>
    <div class="detail-name">${p.name}</div>
    <div class="detail-tagline">${p.age} · ${p.nat} · ${p.job}</div>
    <div class="detail-section">
      <div class="detail-label">Background</div>
      <div class="detail-value">${p.bio}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Attachment style</div>
      <div class="detail-value"><span class="chip chip-attach-${p.attach}" style="font-size:12px;padding:4px 10px">${p.attach}</span></div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Childhood shadow</div>
      <div class="detail-value" style="color:var(--text2);font-style:italic">${p.shadow}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Personality</div>
      <div class="detail-traits">${p.traits.map(t=>`<span class="trait-tag">${t}</span>`).join("")}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Education</div>
      <div class="detail-value">${p.edu}</div>
    </div>
  `;
  document.getElementById("scenario-list").innerHTML = SCENARIOS.map(s => `
    <div class="scenario-item ${s.id === state.scenario ? 'selected' : ''}" onclick="selectScenario('${s.id}')">
      <div class="scenario-icon">${s.icon}</div>
      <div class="scenario-info">
        <h4>${s.label}</h4>
        <p>${s.desc}</p>
      </div>
    </div>
  `).join("");
  goScreen("detail");
}

function selectScenario(id) {
  state.scenario = id;
  document.querySelectorAll(".scenario-item").forEach((el, i) => {
    el.classList.toggle("selected", SCENARIOS[i].id === id);
  });
}

function startChat() {
  state.history = [];
  const p = state.persona;
  const s = SCENARIOS.find(x => x.id === state.scenario);
  document.getElementById("ct-avatar").style.background = p.bg;
  document.getElementById("ct-avatar").style.color = p.fg;
  document.getElementById("ct-avatar").textContent = p.initials;
  document.getElementById("ct-name").textContent = p.name + ", " + p.age;
  document.getElementById("ct-sub").textContent = p.nat + " · " + p.job;
  document.getElementById("ct-badge").textContent = s.icon + " " + s.label;
  document.getElementById("ct-badge").style.background = "rgba(201,169,110,0.1)";
